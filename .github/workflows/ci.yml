name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma client
              run: pnpm --filter @quoteom/api db:generate

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm build
              env:
                  # Vite reads VITE_API_URL at build time. Production VITE_API_URL is injected
                  # by App Platform at runtime via `${APP_URL}`; this is just so the build
                  # doesn't fail on an undefined value.
                  VITE_API_URL: https://placeholder.invalid
