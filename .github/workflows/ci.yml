name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npm run db:generate --workspace @quoteom/api

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm run test

            - name: Build
              run: npm run build
              env:
                  # Vite reads VITE_API_URL at build time. Production VITE_API_URL is injected
                  # by App Platform at runtime via `${APP_URL}`; this is just so the build
                  # doesn't fail on an undefined value.
                  VITE_API_URL: https://placeholder.invalid
