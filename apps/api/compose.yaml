services:
  postgres:
    image: postgres:16-alpine
    container_name: quoteom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quoteom
      POSTGRES_PASSWORD: quoteom
      POSTGRES_DB: quoteom
    ports:
      - '5432:5432'
    volumes:
      - quoteom-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quoteom -d quoteom']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quoteom-postgres-data:
