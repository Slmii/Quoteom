# DigitalOcean App Platform spec.
#
# Two services (api + web) behind one App Platform load balancer + one managed Postgres.
# Routing: /api/* → api component, everything else → web component. Same hostname so
# session cookies + relative-URL fetches Just Work in browser.
#
# Validate before pushing: `doctl apps spec validate .do/app.yaml`
# Bring up first time:     `doctl apps create --spec .do/app.yaml`
# Sync changes:            `doctl apps update <APP_ID> --spec .do/app.yaml`
#
# Secrets (must be set in the App Platform Dashboard before the first deploy succeeds):
#   AUTH_SECRET, STRIPE_SECRET_KEY, STRIPE_PRICE_ID, STRIPE_WEBHOOK_SECRET,
#   RESEND_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#   MICROSOFT_CLIENT_ID, MICROSOFT_CLIENT_SECRET
# Everything marked `type: SECRET` with no value below requires Dashboard setup.

name: quoteom
region: ams

databases:
    - name: quoteom-db
      engine: PG
      version: '16'
      # Flip `production: true` (and bump the cluster size) when going live. The dev
      # cluster runs on a single, shared, smallest-tier node which is fine for staging
      # but not for paying customers.
      production: false

services:
    - name: api
      source_dir: /
      github:
          branch: main
          deploy_on_push: true
      build_command: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@quoteom/api
      run_command: node apps/api/dist/main.js
      environment_slug: node-js
      http_port: 3001
      instance_size_slug: basic-xs
      instance_count: 1
      routes:
          - path: /api
      health_check:
          http_path: /api/healthz
      envs:
          - key: NODE_ENV
            value: production
          - key: API_PORT
            value: '3001'

          # Database — auto-resolved from the managed Postgres component above.
          - key: DATABASE_URL
            scope: RUN_AND_BUILD_TIME
            value: ${quoteom-db.DATABASE_URL}

          # Web ↔ API origin (same app, same URL — App Platform routes by path).
          - key: WEB_ORIGIN
            value: ${APP_URL}
          - key: AUTH_URL
            value: ${APP_URL}/api/auth
          - key: AUTH_TRUST_HOST
            value: 'true'

          # Auth.js — generate with `openssl rand -base64 32`.
          - key: AUTH_SECRET
            scope: RUN_AND_BUILD_TIME
            type: SECRET

          # OAuth-token-at-rest encryption key — generate with `openssl rand -hex 32`.
          # Different key per env (staging ≠ prod). Losing it makes every encrypted
          # token unreadable; leaking it makes them readable to anyone with DB access.
          - key: TOKEN_ENCRYPTION_KEY
            scope: RUN_AND_BUILD_TIME
            type: SECRET

          # Stripe.
          - key: STRIPE_SECRET_KEY
            scope: RUN_AND_BUILD_TIME
            type: SECRET
          - key: STRIPE_PRICE_ID
            scope: RUN_AND_BUILD_TIME
            type: SECRET
          - key: STRIPE_WEBHOOK_SECRET
            scope: RUN_AND_BUILD_TIME
            type: SECRET

          # Resend (transactional email).
          - key: RESEND_API_KEY
            scope: RUN_AND_BUILD_TIME
            type: SECRET
          - key: RESEND_EMAIL_FROM
            value: noreply@updates.sbytes-it.com

          # Google OAuth (leave blank to disable the provider).
          - key: GOOGLE_CLIENT_ID
            scope: RUN_AND_BUILD_TIME
            type: SECRET
          - key: GOOGLE_CLIENT_SECRET
            scope: RUN_AND_BUILD_TIME
            type: SECRET

          # Microsoft Entra OAuth (leave blank to disable).
          - key: MICROSOFT_CLIENT_ID
            scope: RUN_AND_BUILD_TIME
            type: SECRET
          - key: MICROSOFT_CLIENT_SECRET
            scope: RUN_AND_BUILD_TIME
            type: SECRET
          - key: MICROSOFT_TENANT_ID
            value: common

    - name: web
      source_dir: /
      github:
          branch: main
          deploy_on_push: true
      # VITE_API_URL is baked in at build time, so it has to be exported during the build.
      # The web app calls the api via the same App Platform hostname under /api/*.
      build_command: corepack enable && VITE_API_URL=${APP_URL} pnpm install --frozen-lockfile && VITE_API_URL=${APP_URL} pnpm turbo run build --filter=@quoteom/web
      run_command: node apps/web/.output/server/index.mjs
      environment_slug: node-js
      http_port: 3000
      instance_size_slug: basic-xs
      instance_count: 1
      routes:
          - path: /
      envs:
          - key: NODE_ENV
            value: production
          - key: WEB_PORT
            value: '3000'
          # SSR-side fetches read this at runtime (createServerFn handlers). Browser-side
          # fetches use relative URLs through the load balancer.
          - key: VITE_API_URL
            value: ${APP_URL}

# Run `prisma migrate deploy` before each new deploy goes live. PRE_DEPLOY jobs share the
# app's source; `DATABASE_URL` resolves the same way as in the api service.
jobs:
    - name: migrate
      kind: PRE_DEPLOY
      source_dir: /
      github:
          branch: main
          deploy_on_push: true
      build_command: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run db:generate --filter=@quoteom/api
      run_command: cd apps/api && npx prisma migrate deploy
      environment_slug: node-js
      instance_size_slug: basic-xxs
      envs:
          - key: DATABASE_URL
            scope: RUN_AND_BUILD_TIME
            value: ${quoteom-db.DATABASE_URL}
